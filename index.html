<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LubPub</title>
<link rel="icon" href="https://ehrencrona.org/favicon.ico">
<link rel="stylesheet" href="https://ehrencrona.org/shared.css">
</head>
<body>
<div class="page">
  <header class="brand-header">
    <a href="https://ehrencrona.org">
      <picture>
        <source srcset="https://ehrencrona.org/ehrencrona_logo_darkmode.png" media="(prefers-color-scheme: dark)">
        <img class="brand-logo" src="https://ehrencrona.org/ehrencrona_logo.png" alt="Ehrencrona logo">
      </picture>
    </a>
  </header>
  <main class="content">
    <div class="content-inner">
      <h1 class="home-title">LubPub Proxy</h1>
      <div class="card">
        <p class="card-desc">Klistra in artikellänk eller skriv ett PMID för att öppna i ny flik</p>
        <div class="search-row">
          <input class="field" id="urlInput" type="search" placeholder="https://... eller PMID, t.ex. 36927524">
          <button class="search-btn" id="openBtn">Öppna</button>
        </div>
        <div class="footer">Länken rensas automatiskt efter klick</div>
      </div>
    </div>
  </main>
</div>
<script>
(() => {
  const input = document.getElementById('urlInput');
  const btn   = document.getElementById('openBtn');
  const toludwig = url => {
    const clean = url.split('?')[0];
    const u     = new URL(clean);
    const host  = u.hostname.replace(/\./g, '-');
    return `${u.protocol}//${host}.ludwig.lub.lu.se${u.pathname}${u.search}`;
  };
  const go = async () => {
    const raw = input.value.trim();
    if (!raw) return;
    if (/^\d+$/.test(raw)) {
      btn.disabled    = true;
      btn.textContent = 'Hämtar DOI…';
      const win = window.open('', '_blank');
      win.document.write('<title>Hämtar artikel…</title><body style="font-family:sans-serif;padding:2rem;color:#666">Hämtar DOI, ett ögonblick…</body>');
      try {
        const res      = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${raw}&retmode=json`);
        const data     = await res.json();
        const summary  = data.result?.[raw];
        const doiEntry = summary?.articleids?.find(a => a.idtype === 'doi');
        if (doiEntry) {
          win.location.href = toludwig(`https://doi.org/${doiEntry.value}`);
        } else {
          win.close();
          alert('Kunde inte hitta DOI för detta PMID. Kontrollera att numret är rätt.');
        }
      } catch (e) {
        win.close();
        alert('Kunde inte nå NCBI. Kontrollera din internetanslutning.');
        console.error(e);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Öppna';
        input.value     = '';
        input.focus();
      }
      return;
    }
    try {
      window.open(toludwig(raw), '_blank');
      input.value = '';
      input.focus();
    } catch (e) {
      alert('Kunde inte tolka inmatningen. Ange en giltig länk eller ett PMID (enbart siffror).');
      console.error(e);
    }
  };
  btn.addEventListener('click', go);
  input.addEventListener('keydown', e => (e.key === 'Enter') && go());
})();
</script>
</body>
</html>
