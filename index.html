<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LubPub</title>
  <link rel="stylesheet" href="https://ehrencrona.org/shared.css" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: light-dark(var(--bg-light), var(--bg-dark));
      color: light-dark(var(--text-light), var(--text-dark));
      margin: 0;
      min-height: 100vh;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .brand-header {
      margin-bottom: 2rem;
    }

    .brand-header a {
      text-decoration: none;
    }

    .brand-header img {
      height: 36px;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.25rem;
    }

    .subtitle {
      color: light-dark(var(--muted-light), var(--muted-dark));
      margin: 0 0 2rem;
      font-size: 0.95rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.65rem 0.9rem;
      font-size: 1rem;
      border: 1px solid light-dark(var(--border-light), var(--border-dark));
      border-radius: 6px;
      background: light-dark(var(--card-light), var(--card-dark));
      color: light-dark(var(--text-light), var(--text-dark));
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--brand);
    }

    button {
      padding: 0.65rem 1.2rem;
      font-size: 1rem;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover {
      background: var(--brand-hover);
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: light-dark(var(--muted-light), var(--muted-dark));
    }

    .error {
      margin-top: 1rem;
      color: var(--brand);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="brand-header">
      <a href="https://ehrencrona.org">
        <picture>
          <source srcset="https://ehrencrona.org/logo-dark.png" media="(prefers-color-scheme: dark)" />
          <img src="https://ehrencrona.org/logo-light.png" alt="ehrencrona.org" />
        </picture>
      </a>
    </header>

    <main class="content">
      <h1>LubPub</h1>
      <p class="subtitle">Klistra in en artikellänk eller skriv ett PMID – öppnar via LUB-proxy.</p>

      <div class="input-row">
        <input
          type="text"
          id="query"
          placeholder="URL eller PMID, t.ex. 36927524"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button onclick="handle()">Öppna</button>
      </div>

      <p class="hint">Fungerar med artikellänkar (tar bort tracking) och PubMed-ID.</p>
      <p class="error" id="error" hidden></p>
    </main>
  </div>

  <script>
    // Tillåt Enter-tangenten i sökrutan
    document.getElementById("query").addEventListener("keydown", e => {
      if (e.key === "Enter") handle();
    });

    function handle() {
      const raw = document.getElementById("query").value.trim();
      const errorEl = document.getElementById("error");
      errorEl.hidden = true;

      if (!raw) return;

      // Avgör om inmatningen är ett PMID (enbart siffror, 1–8 tecken)
      if (/^\d{1,8}$/.test(raw)) {
        openPmid(raw);
      } else {
        openUrl(raw);
      }
    }

    function openPmid(pmid) {
      const url = `http://lulinker.lub.lu.se/?sid=Entrez:PubMed&id=pmid:${pmid}`;
      window.open(url, "_blank", "noopener");
    }

    function openUrl(input) {
      const errorEl = document.getElementById("error");

      // Lägg till https:// om protokoll saknas
      let href = input;
      if (!/^https?:\/\//i.test(href)) {
        href = "https://" + href;
      }

      let url;
      try {
        url = new URL(href);
      } catch {
        showError("Kunde inte tolka inmatningen som en länk eller ett PMID.");
        return;
      }

      // Ta bort vanliga tracking-parametrar
      const trackingParams = [
        "utm_source","utm_medium","utm_campaign","utm_term","utm_content",
        "fbclid","gclid","msclkid","mc_cid","mc_eid","ref","source"
      ];
      trackingParams.forEach(p => url.searchParams.delete(p));

      const clean = url.toString();
      const proxy = `http://lulinker.lub.lu.se/?url=${encodeURIComponent(clean)}`;
      window.open(proxy, "_blank", "noopener");
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.hidden = false;
    }
  </script>
</body>
</html>
