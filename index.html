<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUB Länk-konverterare</title>
<link rel="icon" href="https://ehrencrona.org/favicon.ico">
<link rel="stylesheet" href="https://ehrencrona.org/shared.css">
<style>
  .lubpub-wrap{display:flex;justify-content:center;align-items:center;padding:10px 0 0}
  .lubpub-card{width:100%;max-width:450px;padding:2.5rem;text-align:center}
  .lubpub-card h2{margin:0 0 .5rem;color:var(--brand)}
  .lubpub-card p{margin:0 0 1.5rem;color:var(--muted);font-size:.95rem}
  .footer{margin-top:1.5rem;font-size:.8rem;color:var(--muted)}
</style>
</head>
<body>
<div class="page">
  <header class="brand-header">
    <a href="https://ehrencrona.org">
     <picture>
      <source srcset="https://ehrencrona.org/ehrencrona_logo_darkmode.png" media="(prefers-color-scheme: dark)">
      <img class="brand-logo" src="https://ehrencrona.org/ehrencrona_logo.png" alt="Ehrencrona logo">
     </picture>
    </a>
  </header>
  <main class="content">
    <div class="content-inner lubpub-wrap">
      <div class="card lubpub-card">
        <h2>LubPub Proxy</h2>
        <p>Klistra in artikellänk eller skriv ett PMID för att öppna i ny flik</p>
        <input class="field" id="urlInput" type="text" placeholder="https://... eller PMID, t.ex. 36927524" autofocus>
        <button class="btn" id="openBtn">Öppna via biblioteket</button>
        <div class="footer">Länken rensas automatiskt efter klick</div>
      </div>
    </div>
  </main>
</div>
<script>
(() => {
  const input = document.getElementById('urlInput');
  const btn   = document.getElementById('openBtn');

  const toludwig = url => {
    const clean = url.split('?')[0];
    const u     = new URL(clean);
    const host  = u.hostname.replace(/\./g, '-');
    return `${u.protocol}//${host}.ludwig.lub.lu.se${u.pathname}${u.search}`;
  };

  const go = async () => {
    const raw = input.value.trim();
    if (!raw) return;

    // PMID: enbart siffror → hämta DOI från NCBI, kör genom ludwig
    if (/^\d+$/.test(raw)) {
      btn.disabled    = true;
      btn.textContent = 'Hämtar DOI…';
      try {
        const res     = await fetch(
          `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${raw}&retmode=json`
        );
        const data    = await res.json();
        const summary = data.result?.[raw];
        const doiEntry = summary?.articleids?.find(a => a.idtype === 'doi');
        if (doiEntry) {
          window.open(toludwig(`https://doi.org/${doiEntry.value}`), '_blank');
        } else {
          alert('Kunde inte hitta DOI för detta PMID. Kontrollera att numret är rätt.');
        }
      } catch (e) {
        alert('Kunde inte nå NCBI. Kontrollera din internetanslutning.');
        console.error(e);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Öppna via biblioteket';
        input.value     = '';
        input.focus();
      }
      return;
    }

    // URL: ludwig-konvertering direkt
    try {
      window.open(toludwig(raw), '_blank');
      input.value = '';
      input.focus();
    } catch (e) {
      alert('Kunde inte tolka inmatningen. Ange en giltig länk eller ett PMID (enbart siffror).');
      console.error(e);
    }
  };

  btn.addEventListener('click', go);
  input.addEventListener('keydown', e => (e.key === 'Enter') && go());
})();
</script>
</body>
</html>
